        primary_paths:
          - frontend/vite.config.ts
          - frontend/index.html
      - id: typescript
        summary: TypeScript project references and compiler options.
        route_here_when: Work changes TS config, paths, or strictness.
        bridge_when: Strictness change forces broad type fixes.
        primary_paths:
          - frontend/tsconfig.json
          - frontend/tsconfig.app.json
          - frontend/tsconfig.node.json
      - id: lint-style
        summary: ESLint, Tailwind, PostCSS configuration.
        route_here_when: Work tunes lint rules, Tailwind theme, or PostCSS pipeline.
        bridge_when: New lint rules force code rewrites elsewhere.
        primary_paths:
          - frontend/eslint.config.js
          - frontend/tailwind.config.js
      - id: backend-pyproject
        summary: Backend dependency list (uv-managed) + ruff config.
        route_here_when: Work adds/removes Python deps or adjusts ruff rules.
        bridge_when: Dep changes may require Docker image updates (V3 Phase 4).
        primary_paths:
          - backend/pyproject.toml

  - id: real-time-editing
    name: Real-Time Collaborative Editing
    summary: |
      Yjs CRDT-based real-time collaborative editing. Independent Node.js
      collab-server provides WebSocket sync + awareness; frontend binds via
      y-codemirror.next; backend provides auth verification and periodic
      snapshot persistence.
    slices:
      - id: collab-server
        summary: Node.js y-websocket server — Yjs sync protocol, awareness broadcast, LevelDB persistence, auth via FastAPI /api/auth/verify.
        route_here_when: Work changes WebSocket handling, persistence strategy, or auth flow for collaborative editing.
        bridge_when: Changes to auth contract require backend /api/auth updates.
        primary_paths:
          - ../src/collab-server/src/index.ts
          - ../src/collab-server/src/ws-handler.ts
          - ../src/collab-server/src/persistence.ts
          - ../src/collab-server/package.json
      - id: frontend-binding
        summary: Yjs ↔ CodeMirror 6 binding — collaborationProvider (WebSocket lifecycle), collaborationStore (Zustand), collaboration-extensions (yCollab + UndoManager), CollaborationStatus UI.
        route_here_when: Work changes how the editor connects to Yjs, how peers are displayed, or how collaboration mode is toggled.
        bridge_when: Editor API changes — see latex-editor/shell.
        primary_paths:
          - frontend/src/services/collaborationProvider.ts
          - frontend/src/stores/collaborationStore.ts
          - frontend/src/features/latex-editor/collaboration-extensions.ts
          - frontend/src/features/shared/CollaborationStatus.tsx
          - frontend/src/features/shared/collaboration-status.css
      - id: backend-support
        summary: FastAPI endpoints + services supporting collab-server — token verification, collab-token echo, internal doc content fetch, periodic snapshot task.
        route_here_when: Work changes how the backend supports the collab-server (auth, seeding, snapshots).
        bridge_when: Snapshot strategy change affects version history — see backend-service/models.
        primary_paths:
          - backend/app/api/auth.py
          - backend/app/api/filesystem.py
          - backend/app/services/collab_snapshot_service.py
          - backend/app/settings.py

  - id: skill-optimization
    name: Skill Optimization
    summary: >
      Data-driven Skill optimization pipeline. Two-Project architecture:
      Data Project side collects signals from labeled data, Annotation Evaluations,
      Workflow Traces, and dialogue sedimentation, then produces diagnosis
      (failure patterns, golden/negative examples, optimization suggestions).
      Handoff bridge transfers diagnosis + eval cases to Skill Project.
      Skill Project side rewrites file tree (SKILL.md, references/, evals/),
      runs eval, and presents results for human review before version commit.
    slices:
      - id: signal-collection
        summary: >
          Gathers optimization signals from 4 sources: Data Project labeled samples
          (DatasetRecord + DatasetResponse), Annotation Evaluations (verdict/tags),
          Workflow Traces (tool call sequences), and dialogue sedimentations.
        route_here_when: Work changes how optimization signals are collected or aggregated.
        bridge_when: Signal snapshot complete — pass to diagnosis.
        primary_paths:
          - backend/app/services/skill_signal_diagnosis_service.py
          - backend/app/services/workflow_trace_parser.py
          - backend/app/services/skill_sedimentation_service.py
          - backend/app/services/dataset_service.py
          - backend/app/services/evaluation_service.py
      - id: diagnosis
        summary: >
          Analyzes signal snapshot to produce failure pattern clustering,
          golden/negative example extraction, workflow pattern analysis,
          and optimization suggestions.  Outputs structured diagnosis JSON.
        route_here_when: Work changes diagnosis logic, pattern extraction, or suggestion generation.
        bridge_when: Diagnosis complete — write to handoff via SkillDataHandoffService.
        primary_paths:
          - backend/app/services/skill_signal_diagnosis_service.py
          - backend/app/services/skill_data_handoff_service.py
      - id: skill-rewrite
        summary: >
          Reads _skill_data/ handoff and rewrites the Skill Project file tree.
          Creates/patches SKILL.md (with optimization markers), writes
          references/ (failure-patterns, golden-examples, etc.), and evals/.
          Uses ProjectFsService for DB-backed file operations.
        route_here_when: Work changes how Skill Project files are generated or patched.
        bridge_when: Skill Project files updated — move to eval.
        primary_paths:
          - backend/app/services/skill_generation_service.py
          - backend/app/services/project_fs_service.py
      - id: eval-review
        summary: >
          Runs eval cases against the Skill Project's Agent, compares results
          with previous runs to detect regressions, generates eval report,
          and presents results for human review (approve/reject).
        route_here_when: Work changes eval execution, evaluator logic, or review workflow.
        bridge_when: Review approved — publish.
        primary_paths:
          - backend/app/services/skill_eval_service.py
          - backend/app/services/native_agent_runner.py
          - backend/app/api/skill_optimization.py
          - frontend/src/pages/SkillOptimizationPage.tsx
