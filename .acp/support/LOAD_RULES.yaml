# LOAD RULES for SuperLeaf
#
# Staged context loading. Start narrow, expand by route, and avoid scanning
# generated or private state unless the task explicitly requires it.
# Refreshed 2026-05-25 for REQ-0187.

bootstrap:
  entrypoint: .acp/version.yaml
  sequence:
    - .acp/support/AGENT.md
    - .acp/support/PROJECT_MAP.yaml
    - .acp/support/LOAD_RULES.yaml
    - .acp/support/CHANGE_POLICY.yaml
    - .acp/capability/capabilities.yaml

loading:
  kernel_history: on_demand
  broad_scan: allowed_after_bootstrap_when_requested
  preferred_routing: capability_first
  search_first_with:
    - rg
    - rg --files
  path_rule: all application paths are rooted at services/, not bare backend/ or frontend/.

minimal_context:
  - .acp/version.yaml
  - .acp/support/AGENT.md
  - .acp/support/PROJECT_MAP.yaml

rules:
  forbidden_paths:
    - .git/
    - reference/
    - referenceold/
    - services/frontend/node_modules/
    - services/frontend/dist/
    - services/frontend/.vite/
    - services/collab-server/node_modules/
    - services/collab-server/dist/
    - services/backend/.venv/
    - services/backend/**/__pycache__/
    - services/backend/.pytest_cache/

  private_paths:
    - .acp/kernel/

  ignored_external_repos:
    - supports/SuperLeaf.MCPs/
    - supports/SuperLeaf.Skills/

  protected_paths:
    - .acp/version.yaml
    - .acp/support/AGENT.md
    - .acp/support/PROJECT_MAP.yaml
    - .acp/support/LOAD_RULES.yaml
    - .acp/support/CHANGE_POLICY.yaml
    - .acp/capability/capabilities.yaml
    - .gitignore
    - start.sh
    - services/backend/pyproject.toml
    - services/backend/uv.lock
    - services/backend/app/settings.py
    - services/backend/app/database.py
    - services/backend/app/secrets_vault.py
    - services/backend/app/models.py
    - services/backend/app/schemas.py
    - services/frontend/package.json
    - services/frontend/package-lock.json
    - services/frontend/vite.config.ts
    - services/frontend/tsconfig.json
    - services/frontend/tsconfig.app.json
    - services/frontend/tsconfig.node.json
    - services/frontend/index.html
    - services/frontend/eslint.config.js
    - services/collab-server/package.json
    - services/collab-server/package-lock.json
    - services/collab-server/tsconfig.json

  high_attention_paths:
    - services/backend/app/services/agent_orchestrator.py
    - services/backend/app/services/attached_files.py
    - services/backend/app/services/nanobot_client.py
    - services/backend/app/services/mcp_tool_service.py
    - services/backend/app/services/project_archive_service.py
    - services/frontend/src/features/right-panel/TeamTab.tsx
    - services/frontend/src/features/latex-editor/LatexEditor.tsx
    - services/frontend/src/stores/documentStore.ts
    - services/frontend/src/stores/projectStore.ts

  route_expansion:
    project-foundation:
      support-layer:
        start_with:
          - .acp/support/AGENT.md
          - .acp/support/PROJECT_MAP.yaml
          - .acp/support/LOAD_RULES.yaml
          - .acp/support/CHANGE_POLICY.yaml
          - .acp/capability/capabilities.yaml
        expand_when:
          - changing agent routing, capability ownership, or protected-path policy
          - adding/removing top-level modules
          - product rename or repository rename work
      public-docs:
        start_with:
          - docs/index.md
          - docs/zh/index.md
          - docs/zh/README.md
          - docs/en/index.md
          - docs/_config.yml
          - docs/_includes/head_custom.html
          - docs/_sass/custom/custom.scss
          - docs/zh/architecture/overview.md
          - docs/zh/getting-started/install.md
          - docs/zh/providers/README.md
          - docs/zh/agents/README.md
          - docs/zh/troubleshooting/README.md
        expand_when:
          - user-facing docs or GitHub Pages navigation changes
          - feature behavior needs handbook documentation
      root-tooling:
        start_with:
          - README.md
          - start.sh
          - .gitignore
        expand_when:
          - launcher, repo hygiene, ignored files, or setup instructions change

    backend-service:
      app-entry:
        start_with:
          - services/backend/app/main.py
          - services/backend/app/settings.py
          - services/backend/app/api/__init__.py
        expand_when:
          - middleware, CORS, lifespan, router aggregation, or env defaults change
      models-and-schemas:
        start_with:
          - services/backend/app/models.py
          - services/backend/app/schemas.py
          - services/backend/app/migrations.py
          - services/backend/app/database.py
        expand_when:
          - table, relationship, migration, or API payload shape changes
      auth-users:
        start_with:
          - services/backend/app/api/auth.py
          - services/backend/app/api/users.py
          - services/backend/app/services/auth_service.py
          - services/backend/app/services/user_service.py
          - services/frontend/src/stores/userStore.ts
          - services/frontend/src/services/authApi.ts
        expand_when:
          - login/session/current-user/authorization behavior changes
      providers:
        start_with:
          - services/backend/app/api/providers.py
          - services/backend/app/services/provider_service.py
          - services/backend/app/services/dify_client.py
          - services/backend/app/services/nanobot_client.py
          - services/frontend/src/features/settings/SettingsDialog.tsx
          - services/frontend/src/stores/settingsStore.ts
        expand_when:
          - provider kinds, model probing, API key handling, or provider UI changes
      secrets:
        start_with:
          - services/backend/app/secrets_vault.py
          - services/backend/app/settings.py
        expand_when:
          - Fernet key storage, rotation, encryption/decryption, or secret path changes

    frontend-workspace:
      shell:
        start_with:
          - services/frontend/src/App.tsx
          - services/frontend/src/App.css
          - services/frontend/src/main.tsx
          - services/frontend/src/router.tsx
          - services/frontend/src/pages/WorkspacePage.tsx
          - services/frontend/src/features/shared/ErrorBoundary.tsx
        expand_when:
          - workspace layout, routing, app bootstrap, error boundary, or global provider changes
      project-list:
        start_with:
          - services/frontend/src/pages/ProjectListPage.tsx
          - services/frontend/src/pages/components/ProjectCard.tsx
          - services/frontend/src/pages/components/ProjectTableRow.tsx
          - services/frontend/src/pages/components/ProjectFormDialog.tsx
          - services/frontend/src/pages/components/DeleteProjectDialog.tsx
          - services/frontend/src/stores/projectStore.ts
          - services/frontend/src/services/projectsApi.ts
        expand_when:
          - project create/list/delete/open behavior changes
      shared-ui:
        start_with:
          - services/frontend/src/features/shared/AgentMarkdown.tsx
          - services/frontend/src/features/shared/TagPill.tsx
          - services/frontend/src/features/shared/toast.tsx
          - services/frontend/src/features/shared/ErrorBoundary.tsx
        expand_when:
          - cross-panel rendering, toast, tag, markdown, or error handling changes

    frontend-topbar:
      topbar:
        start_with:
          - services/frontend/src/features/topbar/Topbar.tsx
          - services/frontend/src/features/topbar/ViewControl.tsx
          - services/frontend/src/features/topbar/UserMenu.tsx
          - services/frontend/src/features/topbar/topbar.css
        expand_when:
          - topbar actions, user menu, view controls, or layout changes
      notifications-presence:
        start_with:
          - services/frontend/src/features/topbar/NotificationBell.tsx
          - services/frontend/src/features/topbar/PresenceIndicator.tsx
          - services/frontend/src/features/topbar/notification-bell.css
          - services/frontend/src/features/topbar/presence-indicator.css
          - services/backend/app/api/notifications.py
          - services/backend/app/services/event_bus.py
        expand_when:
          - notifications, unread counts, online presence, or project events change

    frontend-file-tree:
      tree:
        start_with:
          - services/frontend/src/features/file-tree/FileTree.tsx
          - services/frontend/src/stores/filesystemStore.ts
          - services/frontend/src/services/filesystemApi.ts
          - services/backend/app/api/filesystem.py
          - services/backend/app/services/project_fs_service.py
        expand_when:
          - file/folder CRUD, upload/download, drag/drop, rename, or tree schema changes
      outline:
        start_with:
          - services/frontend/src/features/file-tree/OutlineList.tsx
          - services/frontend/src/services/documentParser.ts
          - services/frontend/src/__tests__/documentParser.test.ts
        expand_when:
          - outline extraction, heading parsing, or scroll-sync changes

    frontend-workspace-center:
      editor-column:
        start_with:
