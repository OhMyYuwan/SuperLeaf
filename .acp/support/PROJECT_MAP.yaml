# PROJECT MAP for SuperLeaf
#
# Structural index for agents. Keep this file route-focused: it should answer
# "where do I start reading?" rather than describe every implementation detail.
# Refreshed 2026-06-01 for REQ-0281 after Skill Project / project-backed
# Skill cache routing was consolidated.
# Refreshed 2026-06-02 for REQ-0309 to route Data Project dataset labeling,
# source-rule sync, source_text snapshot capture, and export packaging.
# Refreshed 2026-06-14 for REQ-0477 to route backend-native MCP, Agent Commands,
# shared SuperLeaf tool registry metadata, anchor repair, and Local Agent Host
# topology boundaries.

project:
  name: SuperLeaf
  root: .
  source_of_truth:
    - services/backend
    - services/frontend
    - services/collab-server
    - services/local-agent-host
    - services/shared
  branch_strategy:
    personal: YuwanZ
    team: develop
    public: main
  privacy_rule: .acp/kernel/ MUST stay out of git. Public docs live in docs/.
  support_repo_rule: supports/ contains independent repositories and must not be tracked by the main SuperLeaf repository.
  runtime_names_to_preserve:
    - YLW_ env prefix
    - ~/.yuwanlab
    - yuwanlab.db
    - yuwanlab-archive
    - yuwanlab runtime/lab identifiers
  local_agent_host_rule: services/local-agent-host is a downloadable user-machine bridge for Codex/Claude/Nanobot. Images may copy it so backend APIs can package it, but all-in-one runtime must not be assumed to auto-start it unless an explicit topology change is approved.
  backend_native_mcp_rule: Backend-native SuperLeaf MCP is an optional backend profile served at /mcp on the backend port. Enable with ./start.sh mcp or YLW_MCP_SERVER_ENABLED=1; do not route token-direct IDE/CLI clients through Local Agent Host by default.
  agent_command_rule: services/backend/app/agent_commands is the shared execution layer for backend-native MCP, legacy /api/mcp compatibility, and backend Agent command reuse. Keep tool schemas in services/shared/superleaf-tools.json and preserve annotations/_meta metadata through every MCP tools/list path.
  agent_write_surface_rule: Existing document body mutation is not a direct MCP write. propose_doc_edit creates a proposal/annotation DB record; create_suggestion creates an annotation DB record; project_write_text_file creates new Project FS/DB docs and refuses overwrites; accepted body edits must flow through editor/Yjs.
  external_io_decoding_rule: external command output and remote catalog/API bytes should be decoded as UTF-8 with replacement at integration boundaries so invalid bytes surface as U+FFFD rather than raw UnicodeDecodeError crashes.

modules:
  # ── ACP governance ──────────────────────────────────────────────
  - id: acp-version
    path: .acp
    kind: governance
    description: ACP profile and version declaration.
    entry_files:
      - .acp/version.yaml

  - id: acp-support
    path: .acp/support
    kind: guidance
    description: Agent bootstrap, project map, load rules, and mutation policy.
    entry_files:
      - .acp/support/AGENT.md
      - .acp/support/PROJECT_MAP.yaml
      - .acp/support/LOAD_RULES.yaml
      - .acp/support/CHANGE_POLICY.yaml

  - id: acp-capability
    path: .acp/capability
    kind: semantic-routing
    description: Capability and slice definitions used for Request routing.
    entry_files:
      - .acp/capability/capabilities.yaml

  - id: acp-kernel
    path: .acp/kernel
    kind: private-history
    description: Private append-only Request / Plan / Change records. Never stage or commit.
    entry_files:
      - .acp/kernel/requests/
      - .acp/kernel/plans/
      - .acp/kernel/changes/

  # ── Product docs and support repositories ───────────────────────
  - id: public-docs
    path: docs
    kind: documentation
    description: GitHub Pages product docs. Chinese is maintained under docs/zh; English is partial under docs/en until the Chinese docs are complete.
