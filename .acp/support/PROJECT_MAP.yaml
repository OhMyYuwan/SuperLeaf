capability_routes:
  project-foundation:
    primary_module: acp-support
    supporting_modules:
      - acp-version
      - acp-capability
      - public-docs
      - repo-root

  backend-service:
    primary_module: backend-service
    supporting_modules:
      - backend-api
      - backend-services
      - backend-tests

  frontend-workspace:
    primary_module: frontend-shell
    supporting_modules:
      - frontend-app
      - frontend-feature-topbar
      - frontend-feature-workspace-center
      - frontend-feature-file-tree
      - frontend-feature-right-panel
      - frontend-feature-shared
      - frontend-stores
      - frontend-services

  frontend-right-panel:
    primary_module: frontend-feature-right-panel
    supporting_modules:
      - frontend-feature-history
      - frontend-feature-workflow-canvas
      - frontend-feature-shared
      - frontend-stores
      - frontend-services

  native-agent-skills:
    primary_module: backend-api
    runtime_contract: |
      Use the project-skill-cache route for Skill Project behavior. Key
      invariant: project-backed Skills are generated from database-backed Skill
      Projects through explicit "更新 Skill 缓存"; live edits do not affect
      Agents until refresh. Project membership controls collaborator access.
      At runtime, Skills are loaded by scanning the Agent workspace disk
      (.agents/skills/) — not by querying the Skill database table. Metadata
      (name, description, tags) is read from skill.yaml or SKILL.md front
      matter. use_skill returns only SKILL.md content + file tree; the Agent
      reads additional files itself via read_agent_file.
      Backend-native MCP is separate from Local Agent Host. Token-direct
      IDE/CLI clients should connect to backend /mcp with Authorization:
      Bearer slmcp_... after starting ./start.sh mcp. Local Agent Host remains
      the browser Bridge path for SuperLeaf page -> local Agent -> browser-
      authorized tool calls. Shared tool metadata lives in
      services/shared/superleaf-tools.json and must retain annotations/_meta
      so clients can distinguish read-only tools, session changes, DB-backed
      annotation/proposal/file writes, and user-accepted Yjs body edits.
      Agent-created proposals/suggestions use backend Agent Commands and
      anchors.py to repair stale ranges with original_text before persistence.
    supporting_modules:
      - shared-tool-registry
      - backend-agent-commands
      - backend-mcp-protocol
      - backend-services
      - support-skills
      - support-mcps
      - local-agent-host
      - public-docs
      - frontend-feature-right-panel
      - frontend-stores
      - frontend-services

  workflow-orchestration:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-workflow-canvas
      - frontend-feature-right-panel
      - frontend-stores
      - frontend-services

  workflow-integration:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-settings
      - frontend-feature-right-panel
      - frontend-stores
      - frontend-services

  data-project:
    primary_module: backend-services
    runtime_contract: |
      Data Project records are dataset snapshots, not live document views.
      WorkflowRun.source_text must be captured when a workflow/native-agent run
      is recorded. DatasetRecord.fields.source_text should store that text
      directly. Source-rule sync may repair legacy pointer-shaped source_text
      values from WorkflowRun.source_text, but record listing and export must
      not reconstruct source text from Doc range_start/range_end.
    supporting_modules:
      - backend-api
      - backend-service
      - backend-tests
      - frontend-page-data-project
      - frontend-services
      - workflow-orchestration
      - workflow-integration
      - native-agent-skills

  project-archive-and-history:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-history
      - frontend-feature-right-panel
      - frontend-stores
      - frontend-services

  collaboration:
    primary_module: collab-server
    supporting_modules:
      - backend-api
      - backend-services
      - frontend-feature-latex-editor
      - frontend-feature-topbar
      - frontend-feature-settings
      - frontend-feature-shared
      - frontend-stores
      - frontend-services

