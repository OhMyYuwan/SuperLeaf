  - id: domain-model
    name: Domain Model
    summary: TypeScript types defining the writing-IDE domain across all 8 layers.
    slices:
      - id: document
        summary: Document / DocumentStructure / Paragraph / Section / Citation / Metadata.
        route_here_when: Work touches the document/structure/paragraph/citation contracts.
        bridge_when: A document-shape change forces editor, parser, or agent type updates.
        primary_paths:
          - frontend/src/types/document.ts
      - id: editor
        summary: EditorState / Selection / SelectionContext.
        route_here_when: Work touches editor selection, viewport, or context-extraction shape.
        bridge_when: Editor module needs to expose new selection metadata.
        primary_paths:
          - frontend/src/types/editor.ts
      - id: agent
        summary: Agent / AgentInput / AgentOutput / Annotation / Suggestion / Risk.
        route_here_when: Work touches Agent input/output schema, annotation/suggestion/risk shape, or permission model.
        bridge_when: Schema change implies outputParser + ingest updates.
        primary_paths:
          - frontend/src/types/agent.ts
      - id: workflow
        summary: Workflow / WorkflowNode / WorkflowEdge / WorkflowTrigger / WorkflowExecution / ExecutionStep.
        route_here_when: Work changes Workflow definitions or execution tracking.
        bridge_when: |
          Workflow shape changes often conflict with runtime types in
          services/backendApi.ts — unification is a V3 Phase 2 task.
        primary_paths:
          - frontend/src/types/workflow.ts
      - id: collaboration
        summary: TeamDiscussion / Message / Participant / AgentCollaboration modes / UserParticipation.
        route_here_when: Work changes multi-agent or user-in-team collaboration shape.
        bridge_when: Collaboration mode changes may need workflow templates updated.
        primary_paths:
          - frontend/src/types/collaboration.ts
      - id: history
        summary: DocumentHistory / DocumentVersion / Operation / Diff.
        route_here_when: Work changes versioning / audit trail contracts.
        bridge_when: History changes propagate to backend persistence (V3 Phase 3).
        primary_paths:
          - frontend/src/types/history.ts
      - id: ui
        summary: EditorDecoration / AnnotationPanelView / DiscussionPanelView / WorkflowPanelView / AgentTeamPanelView.
        route_here_when: Work changes UI view-model contracts.
        bridge_when: View-model changes require store or component updates.
        primary_paths:
          - frontend/src/types/ui.ts
      - id: actions
        summary: UserAction discriminated union + action payloads.
        route_here_when: Work changes the set of user-initiated operations tracked by the system.
        bridge_when: New actions require new history.Operation entries and UI dispatchers.
        primary_paths:
          - frontend/src/types/actions.ts

