      collaboration-binding:
        start_with:
          - services/frontend/src/features/latex-editor/collaboration-extensions.ts
          - services/frontend/src/stores/collaborationStore.ts
          - services/frontend/src/services/collaborationProvider.ts
        expand_when:
          - Yjs CodeMirror binding, awareness, or collaborative text sync changes

    frontend-preview:
      latex:
        start_with:
          - services/frontend/src/features/preview/LatexPreview.tsx
          - services/frontend/src/features/preview/latex-preview.css
          - services/frontend/src/stores/compileStore.ts
          - services/backend/app/api/compile.py
          - services/backend/app/services/latex_compiler.py
        expand_when:
          - compile contract, PDF serving, PDF.js rendering, download, or error extraction changes
      markdown:
        start_with:
