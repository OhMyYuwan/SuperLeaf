        summary: Optional backend-native Streamable HTTP MCP service mounted at /mcp when mcp_server_enabled is true. Handles JSON-RPC POST, GET SSE, DELETE close, session state, resources/prompts, /mcp/status, and token-authenticated tool calls through Agent Commands.
