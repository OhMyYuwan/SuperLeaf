capability_routes:
  project-foundation:
    primary_module: acp-support
    supporting_modules:
      - acp-kernel
      - acp-capability
      - acp-version
      - docs-planning
      - repo-root

  frontend-workspace:
    primary_module: frontend-app-shell
    supporting_modules:
      - frontend
      - frontend-feature-topbar
      - frontend-feature-workspace-center
      - frontend-public

  frontend-right-panel:
    primary_module: frontend-feature-right-panel
    supporting_modules:
      - frontend-feature-workflow-canvas
      - frontend-stores
      - frontend-services

  frontend-file-tree:
    primary_module: frontend-feature-file-tree
    supporting_modules:
      - frontend-stores
      - frontend-services

  frontend-preview:
    primary_module: frontend-feature-preview
    supporting_modules:
      - frontend-feature-workspace-center
      - frontend-stores

  frontend-topbar:
    primary_module: frontend-feature-topbar
    supporting_modules:
      - frontend-app-shell
      - frontend-stores
      - frontend-services

  collaboration:
    primary_module: backend-api
    supporting_modules:
      - backend-app-core
      - backend-services
      - frontend-feature-settings
      - frontend-feature-topbar
      - frontend-stores
      - frontend-services
      - frontend-feature-shared
      - collab-server
    note: |
      Multi-user collaboration surface: ProjectMember model + service,
      role-based access control (owner/editor/viewer), project sharing API,
      in-app notifications (invite events), SSE-based online presence
      tracking, PresenceIndicator avatars, NotificationBell dropdown.
      Frontend ProjectEventBridge dispatches real-time events into stores.
      Privacy principle: Agent/workflow assets are personal — each user's
      workflow definitions, runs, conversations, annotations, evaluations,
      and review states are isolated by user_id. Collaborators share the
      document but never see each other's Agent interactions.

  real-time-editing:
    primary_module: collab-server
    supporting_modules:
      - backend-api
      - backend-services
      - frontend-feature-latex-editor
      - frontend-stores
      - frontend-services
      - frontend-feature-shared
    note: |
      Yjs CRDT-based real-time collaborative editing (Phase 1).
      Architecture: independent Node.js collab-server (:4444) running
      y-protocols sync + awareness over WebSocket, with LevelDB persistence.
      Frontend uses y-codemirror.next to bind Y.Text to CodeMirror 6.
      Backend provides /api/auth/verify for WebSocket auth,
      /api/auth/collab-token for frontend token retrieval,
      /api/internal/docs/{id}/content for initial doc seeding,
      and collab_snapshot_service for periodic text → DB snapshots.
      Awareness protocol shows remote cursors + selections with user colors.
      Annotation positions still tracked via mapRangeThrough (Phase 2 will
      migrate to Y.RelativePosition).

  agent-privacy:
    primary_module: backend-api
    supporting_modules:
      - backend-app-core
      - backend-services
      - frontend-feature-shared
    note: |
      Agent privacy isolation (principle: "Agent 和 workflow 属于个人隐私资产").
      6 tables carry user_id: WorkflowDefinition, WorkflowRun, Conversation,
      Annotation, AnnotationEvaluation, AnnotationReviewState.
      All list/get/mutate endpoints filter by current user. Startup migration
      backfills existing rows to project owner. SSE events include user_id;
      ProjectEventBridge filters out events from other users.

  frontend-workspace-center:
    primary_module: frontend-feature-workspace-center
    supporting_modules:
      - frontend-feature-latex-editor
      - frontend-feature-annotation-panel
      - frontend-feature-preview

  frontend-settings:
    primary_module: frontend-feature-settings
    supporting_modules:
      - frontend-app-shell
      - frontend-stores
      - frontend-services

  frontend-annotations:
    primary_module: frontend-feature-annotation-panel
    supporting_modules:
      - frontend-feature-latex-editor
      - frontend-feature-shared
      - frontend-stores
      - frontend-services
      - frontend-types

  frontend-conversations:
    primary_module: frontend-feature-right-panel
    supporting_modules:
      - frontend-feature-shared
      - frontend-stores
      - frontend-services

  frontend-mention-system:
    primary_module: frontend-feature-shared
    supporting_modules:
      - frontend-services
      - frontend-feature-annotation-panel
      - frontend-feature-right-panel

  frontend-stores:
    primary_module: frontend-stores
    supporting_modules:
      - frontend-services
      - frontend-types

  latex-editor:
    primary_module: frontend-feature-latex-editor
    supporting_modules:
      - frontend-feature-workspace-center
      - frontend-types

  latex-compile:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-preview
      - frontend-stores

  domain-model:
    primary_module: frontend-types
    supporting_modules:
      - frontend-app-shell
      - frontend-feature-latex-editor
      - frontend-stores

  backend-service:
    primary_module: backend-app-core
    supporting_modules:
      - backend
      - backend-api
      - backend-services

  workflow-integration:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-settings
      - frontend-stores
      - repo-root

  workflow-orchestration:
    primary_module: backend-services
    supporting_modules:
      - backend-api
      - frontend-feature-workflow-canvas
      - frontend-feature-right-panel
      - frontend-stores

  build-tooling:
    primary_module: frontend-build-tooling
    supporting_modules:
      - frontend
      - backend
