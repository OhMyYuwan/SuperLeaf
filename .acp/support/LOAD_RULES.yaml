      project-events:
        start_with:
          - services/frontend/src/features/shared/ProjectEventBridge.tsx
          - services/frontend/src/services/projectEventStream.ts
          - services/backend/app/services/event_bus.py
          - services/backend/app/api/projects.py
        expand_when:
          - SSE project event shape, self-origin filtering, or online presence changes

    project-archive-and-history:
      document-history:
        start_with:
          - services/backend/app/api/versions.py
          - services/backend/app/services/version_service.py
          - services/backend/app/services/diff_service.py
          - services/backend/app/services/operation_service.py
          - services/frontend/src/features/history/HistoryTab.tsx
          - services/frontend/src/features/history/DiffModal.tsx
          - services/frontend/src/features/history/OperationsView.tsx
