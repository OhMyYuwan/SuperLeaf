          - services/backend/app/api/archives.py
          - services/backend/app/services/project_archive_service.py
          - services/frontend/src/features/right-panel/ProjectArchiveTab.tsx
          - services/frontend/src/features/history/MajorVersionList.tsx
          - services/frontend/src/features/history/MajorVersionDiffModal.tsx
          - services/frontend/src/stores/majorVersionStore.ts
          - services/frontend/src/services/majorVersionApi.ts
        expand_when:
          - server-side project archive snapshots, GitHub archive binding/push/import, compare, restore, or ZIP download changes

    build-tooling:
      frontend:
        start_with:
          - services/frontend/package.json
          - services/frontend/package-lock.json
          - services/frontend/vite.config.ts
          - services/frontend/tsconfig.json
          - services/frontend/eslint.config.js
        expand_when:
          - frontend dependency, build, lint, Vite, TS, or public asset behavior changes
      backend:
        start_with:
          - services/backend/pyproject.toml
          - services/backend/uv.lock
          - services/backend/app/settings.py
        expand_when:
          - backend dependency, uv environment, config, or runtime setting changes
      collab-server:
        start_with:
          - services/collab-server/package.json
          - services/collab-server/package-lock.json
          - services/collab-server/tsconfig.json
          - services/collab-server/src/index.ts
        expand_when:
          - collab server dependency, build, or start command changes

  expansion_discipline:
    must_justify: true
    must_not_cross:
      - forbidden_paths
      - private_paths
    prefer: read_start_points_then_expand_by_imports_or_tests
    before_editing_protected_paths: create Request and Plan, then keep edits narrowly scoped.
