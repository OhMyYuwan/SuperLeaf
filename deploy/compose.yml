name: ${SUPERLEAF_PROJECT_NAME:-superleaf}

services:
  app:
    image: ${SUPERLEAF_IMAGE:-ghcr.io/ohmyyuwan/superleaf:latest}
    ports:
      - "${SUPERLEAF_BIND_ADDR:-127.0.0.1}:${SUPERLEAF_HTTP_PORT:-8080}:8080"
    environment:
      YLW_DATA_DIR: /data/backend
      YLW_COLLAB_SERVER_URL: http://127.0.0.1:4444
      YLW_COLLAB_INTERNAL_TOKEN: ${YLW_COLLAB_INTERNAL_TOKEN:-}
      YLW_PUBLIC_REGISTRATION: ${YLW_PUBLIC_REGISTRATION:-false}
      YLW_BOOTSTRAP_TOKEN: ${YLW_BOOTSTRAP_TOKEN:-}
      YLW_PUBLIC_BASE_URL: ${YLW_PUBLIC_BASE_URL:-}
      YLW_REGISTRATION_INVITE_TTL_DAYS: ${YLW_REGISTRATION_INVITE_TTL_DAYS:-7}
      YLW_SMTP_HOST: ${YLW_SMTP_HOST:-}
      YLW_SMTP_PORT: ${YLW_SMTP_PORT:-587}
      YLW_SMTP_USERNAME: ${YLW_SMTP_USERNAME:-}
      YLW_SMTP_PASSWORD: ${YLW_SMTP_PASSWORD:-}
      YLW_SMTP_FROM: ${YLW_SMTP_FROM:-}
      YLW_SMTP_TLS: ${YLW_SMTP_TLS:-true}
      YLW_COOKIE_SECURE: ${YLW_COOKIE_SECURE:-auto}
      YLW_MCP_STDIO_ENABLED: ${YLW_MCP_STDIO_ENABLED:-false}
      BACKEND_URL: http://127.0.0.1:8000
      COLLAB_HOST: 127.0.0.1
      COLLAB_PORT: 4444
      COLLAB_DATA_DIR: /data/collab
      COLLAB_LOG_DIR: /data/logs
      COLLAB_WS_PATH_PREFIX: /collab
      COLLAB_INTERNAL_TOKEN: ${YLW_COLLAB_INTERNAL_TOKEN:-}
      SUPERLEAF_BROWSER_BACKEND_URL: ""
      SUPERLEAF_BROWSER_COLLAB_WS_URL: /collab
    volumes:
      - ./data/backend:/data/backend
      - ./data/collab:/data/collab
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/tmp:/tmp
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/cache:/data/cache
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/home:/data/home
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/run-nginx:/run/nginx
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/log-nginx:/var/log/nginx
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/logs:/data/logs
      - ${SUPERLEAF_RUNTIME_DIR:-./data/runtime}/superleaf-config.js:/usr/share/superleaf/html/superleaf-config.js
    healthcheck:
      test:
        [
          "CMD",
          "curl",
          "-fsS",
          "http://127.0.0.1:8080/api/health",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 20s
    restart: unless-stopped
