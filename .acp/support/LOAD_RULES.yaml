          - services/frontend/src/features/right-panel/templates/index.ts
          - services/frontend/src/features/right-panel/templates/debate.json
          - services/frontend/src/features/right-panel/templates/consensus.json
          - services/frontend/src/stores/workflowStore.ts
        expand_when:
          - workflow CRUD, template, run, or inline workflow invocation changes
      automation:
        start_with:
          - services/frontend/src/features/right-panel/AutomationTab.tsx
          - services/frontend/src/features/right-panel/AnnotationAutomationPanel.tsx
          - services/frontend/src/features/right-panel/WritingAutomationPanel.tsx
