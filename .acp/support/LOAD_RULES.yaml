          - services/frontend/src/features/right-panel/workflow-canvas/NodeInspector.tsx
          - services/frontend/src/features/right-panel/workflow-canvas/nodes.tsx
          - services/frontend/src/features/right-panel/workflow-canvas/graphConversion.ts
          - services/frontend/src/features/right-panel/workflow-canvas/health.ts
        expand_when:
          - visual workflow authoring, graph conversion, node validation, palette, or inspector changes
      tests:
        start_with:
          - services/backend/test_workflow_execution.py
          - services/backend/test_nested_workflow.py
          - services/backend/test_loop_membership_routing.py
          - services/backend/test_branch_merge.py
        expand_when:
          - backend workflow behavior changes need regression coverage

    workflow-integration:
      dify:
        start_with:
          - services/backend/app/services/dify_client.py
          - services/backend/app/api/workflows.py
          - services/frontend/src/stores/workflowStore.ts
        expand_when:
          - Dify endpoint, SSE event parsing, workflow run trigger, or provider response changes
      nanobot:
        start_with:
          - services/backend/app/services/nanobot_client.py
          - services/backend/app/services/attached_files.py
          - services/frontend/src/stores/settingsStore.ts
        expand_when:
          - OpenAI-compatible request shape, multimodal blocks, session_id, or Nanobot provider UI changes
      github:
        start_with:
          - services/backend/app/api/github.py
          - services/backend/app/services/github_service.py
          - services/frontend/src/features/settings/SettingsDialog.tsx
          - services/frontend/src/services/backendApi.ts
        expand_when:
          - GitHub auth, device flow, import, push, or repo URL parsing changes

    native-agent-skills:
      backend-routes:
        start_with:
          - services/backend/app/api/native_agents.py
