# SuperLeaf documentation site configuration

title: SuperLeaf
description: 面向学术写作的 AI 辅助协作编辑器 / AI-assisted collaborative editor for academic writing
baseurl: "/SuperLeaf"
url: "https://ohmyyuwan.github.io"
repository: OhMyYuwan/SuperLeaf

# 主题配置
remote_theme: just-the-docs/just-the-docs@v0.10.0

# 导航配置
nav_enabled: true
nav_sort: case_insensitive
heading_anchors: true

aux_links:
  "SuperLeaf on GitHub":
    - "https://github.com/OhMyYuwan/SuperLeaf"
  "中 / En":
    - "/SuperLeaf/en/"

nav_external_links:
  - title: 智能体技能市场
    url: https://github.com/OhMyYuwan/SuperLeaf.Skills
    opens_in_new_tab: true
  - title: MCP 服务市场
    url: https://github.com/OhMyYuwan/SuperLeaf.MCPs
    opens_in_new_tab: true

# 搜索配置
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# 页脚配置
footer_content: "SuperLeaf © 2026. 使用 / Built with <a href=\"https://github.com/just-the-docs/just-the-docs\">Just the Docs</a>."

# Callouts
callouts:
  note:
    title: 提示 / Note
    color: blue
  important:
    title: 重要 / Important
    color: yellow
  warning:
    title: 注意 / Warning
    color: red
  success:
    title: 推荐 / Recommended
    color: green

# 代码高亮
color_scheme: light
