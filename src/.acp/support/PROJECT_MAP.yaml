# PROJECT MAP for YuwanLabWriter
#
# Structural map of the project rooted at src/. Update whenever a module is
# added or removed; this file is the agent's structural index, not a wishlist.
# Refreshed 2026-08-12 for REQ-0026 (V2.2 governance refresh).

project:
  name: YuwanLabWriter
  root: src
  source_of_truth: src
  branch_strategy:
    personal: YuwanZ
    team: develop
    public: main
  privacy_rule: src/.acp/kernel/ and src/docs/ MUST stay out of git.

modules:
  # ── Governance layer ─────────────────────────────────────────────
  - id: acp-version
    path: .acp
    kind: governance
    description: ACP profile and version declaration.
    entry_files:
      - .acp/version.yaml

  - id: acp-kernel
    path: .acp/kernel
    kind: governance
    description: Append-only Request / Plan / Change lineage.
    entry_files:
      - .acp/kernel/requests/
      - .acp/kernel/plans/
      - .acp/kernel/changes/

  - id: acp-support
    path: .acp/support
    kind: guidance
    description: Routing, loading, and policy documents read at bootstrap.
    entry_files:
      - .acp/support/AGENT.md
      - .acp/support/PROJECT_MAP.yaml
      - .acp/support/LOAD_RULES.yaml
      - .acp/support/CHANGE_POLICY.yaml

  - id: acp-capability
    path: .acp/capability
    kind: semantic
    description: Capability + slice definitions (semantic surface).
    entry_files:
      - .acp/capability/capabilities.yaml

  # ── Planning docs ────────────────────────────────────────────────
  - id: docs-planning
    path: docs
    kind: documentation
    description: Product / architecture / milestone planning documents. Git-ignored.
    entry_files:
      - docs/v1_executive_plan.tex
      - docs/v2_executive_plan.md
      - docs/v2_executive_plan.tex
      - docs/v2_1_amendment_dify.md
      - docs/v3_executive_plan.md
      - docs/architecture_data_flow.md
      - docs/doubao_v1_optimized.tex
      - docs/doubao.tex
      - docs/figma.md

  # ── Backend (FastAPI proxy + SQLite persistence) ─────────────────
  - id: backend
    path: backend
    kind: service
    description: FastAPI proxy to Dify / Nanobot + local SQLite persistence. uv-managed, Python 3.11+.
    entry_files:
      - backend/pyproject.toml
      - backend/app/main.py

  - id: backend-app-core
    path: backend/app
    kind: service-core
    description: App entrypoint, settings, database, encrypted secrets vault.
    entry_files:
      - backend/app/__init__.py
      - backend/app/main.py
      - backend/app/settings.py
      - backend/app/database.py
      - backend/app/secrets_vault.py
      - backend/app/models.py
      - backend/app/schemas.py
    note: |
      `models.py` now declares tables: Provider, CachedWorkflow,
      WorkflowRun, WorkflowDefinition, Project/Folder/Doc/FileBlob,
      Conversation, Message, Blob, DocumentVersion, DocumentLabel,
      Operation, AnnotationEvaluation, AnnotationReviewState, Annotation,
      ProjectMember, Notification.
      User/Session tables handle auth; ProjectMember enables Overleaf-style
      multi-user collaboration with role-based access (owner/editor/viewer).
      Privacy isolation: WorkflowDefinition, WorkflowRun, Conversation,
      Annotation, AnnotationEvaluation, AnnotationReviewState all carry
      `user_id` — Agent assets are personal, not shared across collaborators.

  - id: backend-api
    path: backend/app/api
    kind: api-routes
    description: HTTP routes — health, auth, users, providers, projects (incl. members + online presence + SSE events), workflows, filesystem, conversations, compile, versions, annotations/evaluations, notifications.
    entry_files:
      - backend/app/api/__init__.py
      - backend/app/api/health.py
      - backend/app/api/auth.py
      - backend/app/api/users.py
      - backend/app/api/providers.py
      - backend/app/api/projects.py
      - backend/app/api/workflows.py
      - backend/app/api/filesystem.py
      - backend/app/api/conversations.py
      - backend/app/api/compile.py
      - backend/app/api/versions.py
      - backend/app/api/annotation_evaluations.py
      - backend/app/api/notifications.py
      - backend/app/api/deps.py

  - id: backend-services
    path: backend/app/services
    kind: domain-services
    description: Provider clients (Dify / Nanobot), self-hosted multi-agent orchestrator, project filesystem service, LaTeX compiler wrapper, attached-files normalizer, event bus (SSE fan-out + presence tracking), auth service, annotation service, project member service, version service, collab snapshot service.
    entry_files:
      - backend/app/services/__init__.py
      - backend/app/services/dify_client.py
      - backend/app/services/nanobot_client.py
      - backend/app/services/provider_service.py
      - backend/app/services/agent_orchestrator.py
      - backend/app/services/project_fs_service.py
      - backend/app/services/latex_compiler.py
      - backend/app/services/attached_files.py
      - backend/app/services/event_bus.py
      - backend/app/services/auth_service.py
      - backend/app/services/annotation_service.py
      - backend/app/services/evaluation_service.py
      - backend/app/services/project_member_service.py
      - backend/app/services/project_service.py
      - backend/app/services/collab_snapshot_service.py
    note: |
      `agent_orchestrator.py` (≈1267 lines) is the V2.2 self-hosted
      multi-agent + loop runner; canonical baseline since REQ-0015.
      `event_bus.py` provides in-memory SSE fan-out with per-subscriber
      asyncio.Queue and online-user presence tracking.
      `project_member_service.py` handles multi-user collaboration:
      add/remove members, role checks (owner/editor/viewer), shared
      project listing.
      `evaluation_service.py` manages annotation evaluations + review
      states with user_id scoping for privacy isolation.
      `annotation_service.py` persists annotation cards with user_id
      ownership — each collaborator only sees their own Agent outputs.
      `collab_snapshot_service.py` periodically snapshots Yjs-managed
      document text from collab-server into Doc.content + version history.

  # ── Collab Server (Node.js Yjs WebSocket) ───────────────────────
  - id: collab-server
    path: ../src/collab-server
    kind: service
    description: |
      Independent Node.js process providing Yjs CRDT-based real-time
      collaborative editing via WebSocket. Uses y-protocols sync +
      awareness, LevelDB persistence, and authenticates via FastAPI
      /api/auth/verify. Listens on port 4444.
    entry_files:
      - ../src/collab-server/package.json
      - ../src/collab-server/tsconfig.json
      - ../src/collab-server/src/index.ts
      - ../src/collab-server/src/ws-handler.ts
      - ../src/collab-server/src/persistence.ts

  # ── Frontend application ─────────────────────────────────────────
  - id: frontend
    path: frontend
    kind: application
    description: Vite + React 19 + TypeScript writing IDE. Deployed locally via start.sh.
    entry_files:
      - frontend/package.json
      - frontend/index.html
      - frontend/vite.config.ts
      - frontend/tsconfig.json

  - id: frontend-app-shell
    path: frontend/src
    kind: application-shell
    description: React entry, App.tsx workspace shell, top-level layout composition.
    entry_files:
      - frontend/src/main.tsx
      - frontend/src/App.tsx
      - frontend/src/App.css
      - frontend/src/index.css

  - id: frontend-types
    path: frontend/src/types
    kind: domain-model
    description: TypeScript domain contracts for all 8 layers (Document → Editor → Agent → Workflow → Collaboration → History → UI → Actions).
    entry_files:
      - frontend/src/types/document.ts
      - frontend/src/types/editor.ts
      - frontend/src/types/agent.ts
      - frontend/src/types/workflow.ts
      - frontend/src/types/collaboration.ts
      - frontend/src/types/history.ts
      - frontend/src/types/ui.ts
      - frontend/src/types/actions.ts
    note: |
      Runtime types for WorkflowDefinition / Provider / Message / etc
      currently live in `services/backendApi.ts`. Unification with
      `types/*` is a V3 Phase 2 task (B2).

  - id: frontend-stores
    path: frontend/src/stores
    kind: state
    description: Zustand stores — covering document, editor, settings, workflow, annotation, filesystem, conversation, compile, view, project, user, collaboration, plus user-scoped storage and reset utilities.
    entry_files:
      - frontend/src/stores/documentStore.ts
      - frontend/src/stores/editorStore.ts
      - frontend/src/stores/settingsStore.ts
      - frontend/src/stores/workflowStore.ts
      - frontend/src/stores/annotationStore.ts
      - frontend/src/stores/filesystemStore.ts
      - frontend/src/stores/conversationStore.ts
      - frontend/src/stores/compileStore.ts
      - frontend/src/stores/viewStore.ts
      - frontend/src/stores/projectStore.ts
      - frontend/src/stores/userStore.ts
      - frontend/src/stores/collaborationStore.ts
      - frontend/src/stores/_userScopedStorage.ts
      - frontend/src/stores/_reset.ts
      - frontend/src/stores/seedData.ts

  - id: frontend-services
    path: frontend/src/services
    kind: service-layer
    description: Frontend business logic — typed backend API client (incl. projectMemberApi, conversationApi), parsers, selection context, output parser, mention system, range tracker, filesystem API, auth API, projects API, annotation/evaluation API, operation API, project event stream (SSE client), collaboration provider (Yjs WebSocket).
    entry_files:
      - frontend/src/services/backendApi.ts
      - frontend/src/services/filesystemApi.ts
      - frontend/src/services/documentParser.ts
      - frontend/src/services/selectionContext.ts
      - frontend/src/services/outputParser.ts
      - frontend/src/services/mentions.ts
      - frontend/src/services/rangeTracker.ts
      - frontend/src/services/authApi.ts
      - frontend/src/services/projectsApi.ts
      - frontend/src/services/annotationEvaluationApi.ts
      - frontend/src/services/operationApi.ts
      - frontend/src/services/projectEventStream.ts
      - frontend/src/services/collaborationProvider.ts

  - id: frontend-tests
    path: frontend/src/__tests__
    kind: tests
    description: Vitest unit tests for parser, selection context, and output parser.
    entry_files:
      - frontend/src/__tests__/documentParser.test.ts
      - frontend/src/__tests__/selectionContext.test.ts
      - frontend/src/__tests__/outputParser.test.ts

  - id: frontend-feature-latex-editor
    path: frontend/src/features/latex-editor
    kind: feature-module
    description: Self-contained CodeMirror 6 LaTeX editor module + annotation decoration plugin + Yjs collaboration extensions.
    entry_files:
      - frontend/src/features/latex-editor/index.ts
      - frontend/src/features/latex-editor/LatexEditor.tsx
      - frontend/src/features/latex-editor/extensions.ts
      - frontend/src/features/latex-editor/collaboration-extensions.ts
      - frontend/src/features/latex-editor/latex-language.ts
      - frontend/src/features/latex-editor/theme.ts
      - frontend/src/features/latex-editor/annotation-decorations.ts

  - id: frontend-feature-settings
    path: frontend/src/features/settings
    kind: feature-module
    description: Provider registry UI + Project settings dialog (member management panel) — Radix Dialog for add/probe/activate/delete providers and invite/remove project collaborators.
    entry_files:
