          - services/backend/app/services/evaluation_service.py
          - services/backend/app/services/annotation_training_export_service.py
        expand_when:
          - annotation scoring, review state, or training export changes
      backend-persistence:
        start_with:
          - services/backend/app/services/annotation_service.py
          - services/backend/app/api/conversations.py
          - services/backend/app/services/operation_service.py
        expand_when:
          - annotation persistence, conversation-origin annotations, or operation audit changes

    frontend-mention-system:
      parser:
        start_with:
          - services/frontend/src/services/mentions.ts
          - services/frontend/src/__tests__/mentionsAttachedFiles.test.ts
        expand_when:
          - mention syntax, candidate kinds, or attached-file parsing changes
      input-components:
        start_with:
          - services/frontend/src/features/shared/MentionInput.tsx
          - services/frontend/src/features/shared/MentionCodeMirrorInput.tsx
