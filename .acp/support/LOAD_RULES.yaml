      run-history:
        start_with:
          - services/frontend/src/features/right-panel/RunHistoryTab.tsx
          - services/frontend/src/stores/workflowStore.ts
        expand_when:
          - workflow run history display or replay metadata changes
      project-archive:
        start_with:
          - services/frontend/src/features/right-panel/ProjectArchiveTab.tsx
          - services/frontend/src/features/history/MajorVersionList.tsx
          - services/frontend/src/features/history/MajorVersionDiffModal.tsx
          - services/frontend/src/features/history/MajorVersionCreateDialog.tsx
