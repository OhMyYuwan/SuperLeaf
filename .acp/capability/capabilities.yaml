          - frontend/src/services/backendApi.ts
      - id: source-text-snapshot
        summary: Capture and persistence of source text snapshots for workflow/native-agent records.
        route_here_when: Work changes WorkflowRun.source_text, selected/target text extraction, Data Project source_text fields, or legacy pointer repair behavior.
        bridge_when: Workflow execution event shape changes require workflow-integration or workflow-orchestration review.
        primary_paths:
          - backend/app/api/workflows.py
          - backend/app/services/agent_orchestrator.py
          - backend/app/services/dataset_service.py
