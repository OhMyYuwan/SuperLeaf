# YuwanLabWriter 文档站点配置

title: YuwanLabWriter
description: 面向学术写作的 AI 辅助协作编辑器
baseurl: "/YuwanLabWriter"
url: "https://ohmyyuwan.github.io"
repository: OhMyYuwan/YuwanLabWriter

# 主题配置
remote_theme: just-the-docs/just-the-docs@v0.10.0

# 导航配置
nav_enabled: true
nav_sort: case_insensitive
heading_anchors: true

aux_links:
  "YuwanLabWriter on GitHub":
    - "https://github.com/OhMyYuwan/YuwanLabWriter"

nav_external_links:
  - title: Skill Market Catalog
    url: https://github.com/OhMyYuwan/YuwanLabWriter.Skills
    opens_in_new_tab: true

# 搜索配置
search_enabled: true
search:
  heading_level: 2
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# 页脚配置
footer_content: "YuwanLabWriter © 2026. 使用 <a href=\"https://github.com/just-the-docs/just-the-docs\">Just the Docs</a> 主题构建。"

# Callouts
callouts:
  note:
    title: 提示
    color: blue
  important:
    title: 重要
    color: yellow
  warning:
    title: 注意
    color: red
  success:
    title: 推荐
    color: green

# 代码高亮
color_scheme: light
