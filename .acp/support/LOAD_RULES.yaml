          - supports/SuperLeaf.MCPs/docs/README.md
          - supports/SuperLeaf.MCPs/docs/adding-mcp.md
          - supports/SuperLeaf.MCPs/docs/verification.md
          - supports/SuperLeaf.MCPs/catalog.json
          - services/backend/app/services/mcp_config_service.py
          - services/backend/app/services/mcp_catalog_service.py
          - services/backend/app/services/mcp_tool_service.py
          - services/backend/app/api/native_agents.py
          - services/frontend/src/features/right-panel/TeamTab.tsx
          - services/frontend/src/stores/nativeAgentStore.ts
