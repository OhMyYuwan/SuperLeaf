    frontend-annotations:
      panel:
        start_with:
          - services/frontend/src/features/annotation-panel/AnnotationPanel.tsx
          - services/frontend/src/features/annotation-panel/CommentComposer.tsx
          - services/frontend/src/features/annotation-panel/ReviewStatusToggle.tsx
