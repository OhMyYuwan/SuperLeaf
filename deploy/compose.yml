name: ${SUPERLEAF_PROJECT_NAME:-superleaf}

services:
  gateway:
    image: nginx:1.27-alpine
    ports:
      - "${SUPERLEAF_HTTP_PORT:-8080}:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      collab:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  frontend:
    image: ${SUPERLEAF_FRONTEND_IMAGE:-ghcr.io/ohmyyuwan/superleaf-frontend:latest}
    environment:
      SUPERLEAF_BROWSER_BACKEND_URL: ""
      SUPERLEAF_BROWSER_COLLAB_WS_URL: /collab
    expose:
      - "5173"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5173/"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped

  backend:
    image: ${SUPERLEAF_BACKEND_IMAGE:-ghcr.io/ohmyyuwan/superleaf-backend:latest}
    environment:
      YLW_DATA_DIR: /data
      YLW_COLLAB_SERVER_URL: http://collab:4444
    volumes:
      - ./data/backend:/data
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  collab:
    image: ${SUPERLEAF_COLLAB_IMAGE:-ghcr.io/ohmyyuwan/superleaf-collab:latest}
    environment:
      BACKEND_URL: http://backend:8000
      COLLAB_HOST: 0.0.0.0
      COLLAB_PORT: 4444
      COLLAB_DATA_DIR: /data/collab
      COLLAB_WS_PATH_PREFIX: /collab
    volumes:
      - ./data/collab:/data/collab
    expose:
      - "4444"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4444/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
