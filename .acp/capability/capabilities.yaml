  - id: data-project
    name: Data Project
    summary: |
      Dataset-centered labeling, evaluation, and packaging workspace. Owns Data
      Project source rules, continuous sync from projects / Agents / Skills /
      Workflows, record queue browsing, label responses, export packages, and
      source_text snapshot semantics for workflow-derived records.
    invariants:
      - WorkflowRun.source_text is the canonical source text snapshot for workflow/native-agent runs.
      - DatasetRecord.fields.source_text stores actual text, not a Doc range pointer.
      - Record listing and export must not reconstruct source text from Doc range_start/range_end.
      - Legacy pointer-shaped source_text values may be repaired only during sync when a workflow run snapshot exists.
    slices:
      - id: source-rules-sync
        summary: Source-rule creation, filtering, continuous sync, dedupe, and repair of existing dataset records.
        route_here_when: Work changes source project selection, Agent/Skill/Workflow filters, source type filters, sync batches, candidate fingerprints, or automatic updates from growing data.
        bridge_when: Filter candidates depend on native Agent, Skill, or Workflow naming — coordinate with native-agent-skills and workflow-orchestration.
        primary_paths:
          - backend/app/api/datasets.py
          - backend/app/services/dataset_service.py
