  - id: native-agent-skills
    name: Native Agent & Skills
    summary: |
      Backend-managed native Agents, Skills, and SuperLeaf/MCP tools. Owns encrypted native Agent
      credentials, native Agent CRUD/runtime, local Skill library, Skill
      Marketplace sync/install, Skill content encryption, share visibility, and
      AgentSkill assignment. Also owns the app-side consumption of
      `supports/SuperLeaf.MCPs` for catalog-driven MCP preset discovery,
      probe, golden tests, and runtime tool calls. Project-backed Skills are
      generated from Skill Projects via an explicit cache refresh and are
      shared by project membership rather than copied per collaborator.
      At runtime, Skills are loaded by scanning the Agent workspace disk
      (.agents/skills/), not from the database; metadata comes from
      skill.yaml or SKILL.md front matter. SuperLeaf's own backend-native MCP
      uses Agent Commands and services/shared/superleaf-tools.json; it is
      separate from Local Agent Host's browser Bridge.
    slices:
      - id: backend-routes
        summary: /api/native-agent routes for credentials, uploaded/private/shared skills, agents, Skill Marketplace install/update/uninstall, and MCP catalog/probe/golden-test endpoints.
        route_here_when: Work changes native Agent, non-project Skill, MCP HTTP contracts, permission checks, marketplace/catalog endpoints, or response shape. Use project-skill-cache for Skill Project cache route changes.
        bridge_when: Frontend state or TeamTab UX must be updated with backend contract changes.
        primary_paths:
          - backend/app/api/native_agents.py
          - backend/app/schemas.py
      - id: backend-services
        summary: NativeAgentService + runner/registry + Skill crypto/marketplace services + MCP tool/catalog services.
        route_here_when: Work changes encrypted credential handling, local Skill storage, non-project visibility/share/delete semantics, marketplace sync/install, native Agent runtime loading, disk-based Skill scanning from .agents/skills/, skill.yaml / SKILL.md front matter parsing, MCP discovery, or MCP tool-call behavior. Use project-skill-cache for Skill Project lifecycle work.
        bridge_when: Project membership changes route through collaboration/project-members; provider model changes route through workflow-integration/provider-registry.
        primary_paths:
          - backend/app/services/native_agent_service.py
          - backend/app/services/native_agent_runner.py
          - backend/app/services/agent_registry_service.py
          - backend/app/services/mcp_tool_service.py
          - backend/app/services/mcp_catalog_service.py
          - backend/app/services/skill_content_crypto.py
          - backend/app/services/skill_marketplace_service.py
          - backend/app/models.py
          - backend/app/settings.py
      - id: shared-tool-registry
        summary: services/shared/superleaf-tools.json is the canonical SuperLeaf tool schema/catalog for backend-native MCP, Local Agent Host, frontend prompts, and backend Native Agent tool definitions. It carries MCP annotations and _meta.superleaf writeSurface/groundTruth/bodyMutation/anchorPolicy metadata.
        route_here_when: Work changes SuperLeaf tool names, descriptions, inputSchema, resources, prompts, tool metadata, read/write classification, ground-truth labels, or prompt guidance.
        bridge_when: Execution behavior changes route through agent-commands or backend-native-mcp. Frontend prompt/marker rendering changes route through frontend-management.
        primary_paths:
          - ../services/shared/superleaf-tools.json
          - backend/app/agent_commands/registry.py
          - backend/app/services/superleaf_tool_registry.py
          - ../services/local-agent-host/superleaf-tools.mjs
          - frontend/src/services/superleafTools.ts
      - id: agent-commands
        summary: Shared backend execution layer for SuperLeaf MCP/Agent tools. Owns AgentCommandContext, dispatcher, shared registry loading, project list/read/grep/outline, new-file Project FS writes, proposal/suggestion DB writes, write-scope enforcement, and text-anchor repair for annotations/proposals.
        route_here_when: Work changes SuperLeaf MCP tool execution, project selection, read/search/outline behavior, project_write_text_file/project_create_text_file behavior, propose_doc_edit/create_suggestion behavior, anchor_status results, or Agent write-scope enforcement.
        bridge_when: Protocol/session changes route through backend-native-mcp. Existing document body mutation is high-risk and must be designed with real-time-editing/Yjs.
        primary_paths:
          - backend/app/agent_commands/context.py
          - backend/app/agent_commands/executor.py
          - backend/app/agent_commands/registry.py
          - backend/app/agent_commands/project.py
          - backend/app/agent_commands/files.py
          - backend/app/agent_commands/suggestions.py
          - backend/app/agent_commands/anchors.py
          - backend/app/services/native_agent_tool_kernel.py
          - backend/test/test_agent_command_project.py
          - backend/test/test_agent_command_registry.py
          - backend/test/test_agent_command_write.py
          - backend/test/test_superleaf_mcp_write_tools.py
      - id: backend-native-mcp
        summary: |
          Token-direct SuperLeaf MCP server mounted by the backend optional
          profile. It is used by Codex/IDE/CLI clients via /mcp with
          Authorization bearer tokens (`slmcp_...`) and delegates real tool
          execution to Agent Commands.
        route_here_when: Work changes backend MCP protocol, token session state, /mcp/status, JSON-RPC batch/SSE/DELETE behavior, resources/prompts/current context, graceful tool errors, or Codex/IDE installation docs.
        bridge_when: Local browser Bridge behavior is local-agent-host. Tool schema and metadata are shared-tool-registry. Tool execution is agent-commands.
        primary_paths:
          - backend/app/mcp/router.py
          - backend/app/mcp/sessions.py
          - backend/app/mcp/transport.py
          - backend/app/api/mcp.py
          - backend/app/api/mcp_rpc.py
          - backend/app/services/superleaf_mcp_registry.py
          - backend/app/services/superleaf_mcp_tools.py
          - backend/app/services/superleaf_mcp_transport.py
          - backend/app/services/mcp_token_service.py
          - backend/test/test_backend_mcp_mount_policy.py
          - backend/test/test_backend_mcp_protocol.py
          - backend/test/test_backend_mcp_rpc.py
          - backend/test/test_superleaf_mcp_registry.py
          - backend/test/test_superleaf_mcp_tools.py
          - backend/test/test_superleaf_mcp_transport.py
          - ../docs/zh/agents/mcp-token-mode.md
          - ../docs/zh/superleaf-mcp-architecture-plan.md
      - id: local-agent-host
        summary: User-machine localhost bridge for SuperLeaf page -> Local Agent -> browser-authorized SuperLeaf tools. It shares the tool registry and can proxy backend /mcp for compatibility, but it is not the token-direct backend MCP server.
        route_here_when: Work changes Local Agent Host server.mjs, Codex/Claude/Nanobot bridge behavior, browser Bridge context/pending calls, backend-mcp-client proxying, package scripts, or docs explaining Local Host vs backend MCP topology.
        bridge_when: Backend token-direct MCP protocol changes route through backend-native-mcp. Moving Local Agent Host into server runtime is high-risk.
        primary_paths:
          - ../services/local-agent-host/server.mjs
          - ../services/local-agent-host/backend-mcp-client.mjs
          - ../services/local-agent-host/superleaf-tools.mjs
          - ../services/local-agent-host/README.md
          - ../docs/zh/agents/local-agent-mcp.md
          - backend/app/api/native_agents.py
      - id: project-skill-cache
        summary: |
          Skill Project cache lifecycle: README.md/SKILL.md project templates,
          manual cache refresh, marketplace copy-to-project, collaborator
          visibility, cache removal/recreate, and runtime loading from cached
          project files. Project skills are referenced from the Agent workspace
          via .skillref.json files pointing to the cache directory.
        route_here_when: Work changes Skill Project creation/templates, "更新 Skill 缓存", skills-cache path/reference behavior, .git/binary filtering, project-backed Skill visibility, removal/recovery, .skillref.json references, or Agent runtime consumption of cached references.
        bridge_when: UI copy/navigation changes route through frontend-management; member role logic routes through collaboration/project-members.
        primary_paths:
          - backend/app/api/projects.py
          - backend/app/services/native_agent_service.py
          - backend/app/services/agent_registry_service.py
          - backend/app/services/project_service.py
          - backend/app/services/project_fs_service.py
          - backend/app/services/project_member_service.py
          - backend/app/services/skill_marketplace_service.py
          - backend/test/test_project_skill_cache.py
          - backend/test/test_skill_marketplace_project_clone.py
          - frontend/src/features/right-panel/ProjectArchiveTab.tsx
          - frontend/src/features/right-panel/TeamTab.tsx
          - frontend/src/stores/nativeAgentStore.ts
          - docs/zh/agents/skills.md
          - docs/zh/architecture/overview.md
          - README.md
      - id: frontend-management
        summary: TeamTab Agent, Skill, and MCP subtabs — AgentSkill capsules, local Skill library, Skill Market search/install, MCP catalog listing, MCP probe/golden-test, custom MCP summaries, private upload, share/update/unshare flows.
        route_here_when: Work changes the native Agent form, Skill management panel, MCP management panel, marketplace search/install UX, local library rows, or sharing dialog.
        bridge_when: Backend contract changes route through backend-routes first.
        primary_paths:
          - frontend/src/features/right-panel/TeamTab.tsx
          - frontend/src/features/right-panel/right-panel.css
          - frontend/src/stores/nativeAgentStore.ts
          - frontend/src/services/backendApi.ts
      - id: mcp-catalog
        summary: Maintained third-party MCP support catalog under supports/SuperLeaf.MCPs plus app-side catalog loader/probe/golden-test integration. This is not SuperLeaf's own backend-native MCP server.
        route_here_when: Work adds, verifies, downgrades, documents, or removes a third-party MCP preset; changes preset schema fields; edits MCP golden tests; or changes how the app consumes the catalog.
        bridge_when: A catalog change needs new frontend controls or backend transport behavior — coordinate with frontend-management and backend-services in the same Request.
        primary_paths:
          - supports/SuperLeaf.MCPs/README.md
          - supports/SuperLeaf.MCPs/docs/
          - supports/SuperLeaf.MCPs/catalog.json
          - supports/SuperLeaf.MCPs/presets/
          - supports/SuperLeaf.MCPs/golden-tests/
          - backend/app/services/mcp_catalog_service.py
          - backend/app/services/mcp_tool_service.py
          - backend/app/api/native_agents.py
          - frontend/src/features/right-panel/TeamTab.tsx
          - frontend/src/stores/nativeAgentStore.ts
          - frontend/src/services/backendApi.ts

  - id: workflow-integration
    name: Workflow Integration (Providers)
    summary: |
      Cross-cutting surface that owns how our system speaks to external provider
      runtimes (Dify, Nanobot). Spans backend clients + frontend settings.
      Distinct from workflow-orchestration: this capability is about **single
      agent calls to one provider**; orchestration composes many into graphs.
    slices:
      - id: dify-client
        summary: Typed async client for Dify's /workflows/run, /chat-messages, /info, /workflows/run/:id; SSE handler.
        route_here_when: Work changes how we speak to Dify, parse responses, or handle SSE.
        bridge_when: New Dify Workflow output fields require types/agent.ts + outputParser updates.
        primary_paths:
          - backend/app/services/dify_client.py
      - id: nanobot-client
        summary: OpenAI Chat Completions-style client for Nanobot; session_id support; multimodal content blocks (text + image_url).
        route_here_when: Work changes Nanobot API interaction, session semantics, or multimodal payload shape.
        bridge_when: Multimodal contract change — see frontend-mention-system/backend-contract.
        primary_paths:
          - backend/app/services/nanobot_client.py
      - id: provider-registry
        summary: Provider model + service + CRUD API; Settings/Team provider management on frontend.
        route_here_when: Work changes provider lifecycle — registration, probing, activation, rotation.
        bridge_when: New provider kinds require backend services AND frontend form branches.
        primary_paths:
          - backend/app/models.py
          - backend/app/services/provider_service.py
          - backend/app/api/providers.py
          - frontend/src/stores/settingsStore.ts
          - frontend/src/features/settings/SettingsDialog.tsx
      - id: workflow-run
        summary: End-to-end single-agent run — selection → /api/workflows/{id}/run → SSE → outputParser → annotationStore.
        route_here_when: Work changes how a single agent workflow is triggered, streamed, or ingested.
        bridge_when: Adds multi-agent composition — see workflow-orchestration instead.
        primary_paths:
          - backend/app/api/workflows.py
          - backend/app/services/dify_client.py
          - backend/app/services/nanobot_client.py
          - frontend/src/stores/workflowStore.ts
          - frontend/src/services/outputParser.ts

  - id: workflow-orchestration
    name: Workflow Orchestration (Self-hosted)
    summary: |
      The V2.2 self-hosted multi-agent orchestrator. Introduced by REQ-0015 and
      extended through REQ-0023. Supports `agent` (atomic) + `loop` (container)
      node types with arbitrary nesting. CANONICAL BASELINE — see
      CHANGE_POLICY high_risk.extend_self_hosted_orchestrator for boundary.
    slices:
      - id: orchestrator
        summary: agent_orchestrator.py — graph traversal, SSE event emission, loop round-tripping, per-node input/output capture.
        route_here_when: Work fixes bugs or extends behavior WITHIN the agent + loop model.
        bridge_when: New node type / swap run loop / new persistence — escalate to Request (boundary in CHANGE_POLICY).
        primary_paths:
          - backend/app/services/agent_orchestrator.py
      - id: definition-api
        summary: /api/workflows/definitions CRUD + /definitions/{id}/execute SSE streaming endpoint.
        route_here_when: Work changes definition API, graph validation, or execute endpoint.
        bridge_when: Graph schema change — see WorkflowDefinition model.
        primary_paths:
          - backend/app/api/workflows.py
      - id: canvas
        summary: Visual authoring surface — workflow-canvas module (react-flow). See frontend-feature-workflow-canvas for slice detail.
        route_here_when: Work changes visual authoring.
        bridge_when: See frontend-feature-workflow-canvas.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/
      - id: templates
        summary: |
          Workflow templates under frontend/src/features/right-panel/templates/
          (V3 Phase 2: debate.json, consensus.json). One-click create
          pre-wired collaboration patterns without engine changes.
        route_here_when: Work adds or edits template JSONs.
        bridge_when: New template needs a new node type — escalate.
        primary_paths:
          - frontend/src/features/right-panel/templates/

