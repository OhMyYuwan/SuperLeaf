          - frontend/src/services/backendApi.ts
      - id: records-labeling
        summary: Record queue, record inspector, label schema/settings panel, draft/submitted/discarded responses, and UI layout.
        route_here_when: Work changes how records are listed, filtered, selected, displayed, labeled, saved, or shown in the Data Project page.
        bridge_when: Shared markdown, toast, or form controls change globally — coordinate with frontend-workspace or frontend-annotations.
        primary_paths:
