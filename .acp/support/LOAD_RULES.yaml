      backend-contract:
        start_with:
          - services/backend/app/services/attached_files.py
          - services/backend/app/services/native_agent_runner.py
          - services/backend/app/services/agent_orchestrator.py
        expand_when:
          - attached-file prompt rendering, budget rules, or multimodal bridge changes

    frontend-right-panel:
      shell:
        start_with:
          - services/frontend/src/features/right-panel/RightPanel.tsx
          - services/frontend/src/features/right-panel/right-panel.css
        expand_when:
          - right-panel tabs, versions subnav, or panel-level composition changes
      discussion:
        start_with:
          - services/frontend/src/features/right-panel/DiscussionTab.tsx
          - services/frontend/src/stores/conversationStore.ts
          - services/backend/app/api/conversations.py
          - services/backend/app/services/conversation_session_service.py
        expand_when:
