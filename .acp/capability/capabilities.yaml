# Capability Map for SuperLeaf
#
# Each capability is a semantic surface, not a directory. Slices are the
# narrowest authority boundaries; routing fields below are the contract that
# keeps future Requests on rails.
# Refreshed 2026-06-01 for REQ-0281.
# Refreshed 2026-06-02 for REQ-0309: Data Project is a first-class capability
# for dataset source rules, record labeling, source_text snapshots, and exports.
# Refreshed 2026-06-14 for REQ-0477: backend-native SuperLeaf MCP, Agent
# Commands, shared tool registry metadata, and anchor repair are first-class
# routing surfaces.
# Path convention: primary_paths are semantic shorthand. Expand backend/ to
# services/backend/ and frontend/ to services/frontend/ when opening files.
#
# Alias notes for historical kernel records:
#   * `frontend-workspace/agent-panel` in REQ-0001..0013 refers to the
#     surface that has since been extracted into `frontend-right-panel`.
#   * `workflow-integration/workflow-run` is no longer a placeholder; its
#     modern successor is the `workflow-orchestration` capability below,
#     plus the refreshed `workflow-integration/workflow-run` slice that
#     describes current behavior.

capabilities:
  - id: project-foundation
    name: Project Foundation
    summary: ACP governance, planning documents, repository tooling, and cross-cutting project scaffolding that does not belong to one feature.
    slices:
      - id: _root
        summary: ACP kernel, support, and capability files; .gitignore; start.sh; root README.
        route_here_when: Work changes ACP records, branch policy, repo-level tooling, ignore rules, or root-level docs.
        bridge_when: A governance change forces a code change in frontend / backend / scripts — open a separate Request.
        primary_paths:
          - .acp/version.yaml
          - .acp/support/
          - .acp/capability/
          - .acp/kernel/
          - ../.gitignore
          - ../start.sh
          - ../README.md
      - id: planning-docs
        summary: Public user docs and architecture notes under docs/.
        route_here_when: Work authors or revises product/architecture/plan documents.
        bridge_when: A plan implies code work — record a separate Request for the code change.
        primary_paths:
          - docs/zh/README.md
          - docs/zh/architecture/overview.md
          - docs/zh/agents/
          - docs/zh/providers/
          - docs/zh/workflows/
      - id: dify-launcher
        summary: Wrapper script around Dify's official docker-compose stack under reference/dify/docker/.
        route_here_when: Work adjusts how we bring Dify up/down, .env initialization, or port mapping.
        bridge_when: Dify config changes imply backend DifyClient changes — coordinate with workflow-integration.
        primary_paths:
          - ../scripts/dify.sh

  - id: frontend-workspace
    name: Frontend Workspace
    summary: The local-Web React + Vite writing IDE shell. Composes topbar + left file tree + center workspace + right panel. Holds cross-panel bootstrap and store wiring.
    slices:
      - id: shell
        summary: App.tsx entrypoint — store bootstrap (filesystem / providers / workflows), layout composition (4-column Overleaf layout), decoration specs derivation, pending-comment state.
        route_here_when: Work changes overall layout, shell-level state derivation, or store bootstrap order.
        bridge_when: Layout changes need new contracts with topbar / file-tree / workspace-center / right-panel — split into slice Requests.
        primary_paths:
          - frontend/src/App.tsx
          - frontend/src/App.css
          - frontend/src/main.tsx
          - frontend/src/index.css
          - frontend/index.html

  - id: frontend-topbar
    name: Frontend Topbar
    summary: Top bar with app title, view controls for column toggles, notifications, presence, and user menu.
    slices:
      - id: bar
        summary: Topbar + its buttons. Triggers SettingsDialog open, view-store column toggles.
        route_here_when: Work changes top-bar affordances, shortcuts, or header identity.
        bridge_when: New buttons invoke other features — route through their capabilities.
        primary_paths:
          - frontend/src/features/topbar/Topbar.tsx
          - frontend/src/features/topbar/ViewControl.tsx
          - frontend/src/features/topbar/NotificationBell.tsx
          - frontend/src/features/topbar/PresenceIndicator.tsx
          - frontend/src/features/topbar/UserMenu.tsx
          - frontend/src/features/topbar/topbar.css

  - id: frontend-workspace-center
    name: Frontend Workspace Center
    summary: Center workspace column — editor + toolbar + annotation column + preview column. Hosts the CodeMirror mount, annotation-decorations integration, and selection-driven comment pending state.
    slices:
      - id: editor-column
        summary: EditorColumn + EditorToolbar — composes LatexEditor, wires decorationSpecs, handles selection toolbar for add-comment.
        route_here_when: Work changes editor mounting, toolbar, selection toolbar, or decoration wiring.
        bridge_when: Decoration style changes ride through frontend-annotations/decorations.
        primary_paths:
          - frontend/src/features/workspace-center/EditorColumn.tsx
          - frontend/src/features/workspace-center/EditorToolbar.tsx
          - frontend/src/features/workspace-center/workspace-center.css
      - id: annotation-column
        summary: Right-of-editor narrow annotation column — hosts the AnnotationPanel inside workspace-center layout.
        route_here_when: Work changes how AnnotationPanel integrates into the center column.
        bridge_when: Panel content changes — see frontend-annotations.
        primary_paths:
          - frontend/src/features/workspace-center/AnnotationColumn.tsx
      - id: preview-column
        summary: Preview column — switches between LatexPreview and MarkdownPreview based on current doc format.
        route_here_when: Work changes format-switch logic or preview-column sizing.
        bridge_when: Actual renderer changes — see frontend-preview.
        primary_paths:
          - frontend/src/features/workspace-center/PreviewColumn.tsx

  - id: frontend-file-tree
    name: Frontend File Tree
    summary: Left-column project tree + outline list. Drives activeDocumentId changes in documentStore; supports rename/create/delete/drag.
    slices:
      - id: tree
        summary: FileTree component — renders filesystemStore.tree; CRUD + drag-and-drop wiring; icons per mime.
        route_here_when: Work changes tree rendering, CRUD affordances, or drag semantics.
        bridge_when: Tree schema changes — see filesystemStore.
        primary_paths:
          - frontend/src/features/file-tree/FileTree.tsx
          - frontend/src/features/file-tree/file-tree.css
      - id: outline
        summary: OutlineList — derived from active document's DocumentStructure.sections; click jumps editor to position.
        route_here_when: Work changes outline rendering, scroll-sync, or heading styles.
        bridge_when: Structure-extraction logic change — see documentParser.
        primary_paths:
          - frontend/src/features/file-tree/OutlineList.tsx

  - id: frontend-preview
    name: Frontend Preview
    summary: Document preview renderers — LaTeX (via latexmk -> PDF.js) and Markdown (markdown-it + KaTeX).
    slices:
      - id: latex
        summary: LatexPreview component — requests compile via compileStore, renders PDF via pdfjs-dist.
        route_here_when: Work changes LaTeX preview rendering, compile triggering, or PDF display.
        bridge_when: Compile contract changes — see latex-compile capability.
        primary_paths:
          - frontend/src/features/preview/LatexPreview.tsx
          - frontend/src/features/preview/latex-preview.css
      - id: markdown
        summary: MarkdownPreview — markdown-it with KaTeX plugin; live-updates from documentStore.
        route_here_when: Work changes Markdown rendering, plugin set, or math support.
        bridge_when: Pandoc conversion added — future separate capability.
        primary_paths:
          - frontend/src/features/preview/MarkdownPreview.tsx
          - frontend/src/features/preview/markdown-preview.css

  - id: frontend-annotations
    name: Frontend Annotations
    summary: Card-based UI for annotations / suggestions / risks / user-comments. Hosts CommentComposer + continue composer. Integrates with mention system for @-mention routing to agents / workflows / files.
    slices:
      - id: panel
        summary: AnnotationPanel — card list with Accept / Delete / Continue. Composer for new user-comment with @-mention, and inline continue composer with @-mention.
        route_here_when: Work changes card rendering, action semantics, composer behavior, or continue-thread logic.
        bridge_when: Changes interact with annotationStore, mention system, or editor decorations.
        primary_paths:
          - frontend/src/features/annotation-panel/AnnotationPanel.tsx
          - frontend/src/features/annotation-panel/CommentComposer.tsx
          - frontend/src/features/annotation-panel/annotation-panel.css
          - frontend/src/features/annotation-panel/index.ts
          - frontend/src/stores/annotationStore.ts
          - frontend/src/services/outputParser.ts
      - id: decorations
        summary: CodeMirror plugin that renders marks for each annotation kind (annotation wavy yellow, suggestion solid blue, risk wavy red, user-comment solid yellow) and emits click events to host.
        route_here_when: Work changes underline styles, hover behavior, click dispatch, or new decoration kinds.
        bridge_when: New kinds require paired annotationStore + AnnotationPanel updates.
        primary_paths:
          - frontend/src/features/latex-editor/annotation-decorations.ts
          - frontend/src/App.css   # decoration class CSS lives here

  - id: frontend-right-panel
    name: Frontend Right Panel
    summary: |
      Right-side tabbed panel. Tabs: Discussion (doc-scoped chats with agents),
      Team (Provider / native Agent / Skill / MCP / Workflow management),
      Automation, Run History, and Versions (project archive + document
      history). Workflow Definitions, Skill management, and MCP catalog
      management now live inside Team
      subtabs.
      (Alias: `frontend-workspace/agent-panel` from REQ-0001..0013.)
    slices:
      - id: panel-shell
        summary: RightPanel component — tab switching, header layout, Automation tab, and Versions subnav.
        route_here_when: Work changes tab set or panel composition.
        bridge_when: New tab requires its own slice here + its own store.
        primary_paths:
          - frontend/src/features/right-panel/RightPanel.tsx
          - frontend/src/features/right-panel/AutomationTab.tsx
          - frontend/src/features/right-panel/ProjectArchiveTab.tsx
          - frontend/src/features/right-panel/right-panel.css
      - id: discussion
        summary: DiscussionTab — chat-style conversations per (document × agent). Supports @-mention of agents / workflows / files; auto-attaches selection context; SSE streaming.
        route_here_when: Work changes discussion UI, conversation lifecycle, or mention handling in discussion.
        bridge_when: Message contract changes — see conversationStore + conversations API.
        primary_paths:
          - frontend/src/features/right-panel/DiscussionTab.tsx
          - frontend/src/features/right-panel/discussion.css
      - id: team
        summary: TeamTab — provider CRUD, native Agent CRUD, AgentSkill assignment, local Skill library, Skill Marketplace search/install, MCP catalog/custom server management, and Workflow Definition management.
        route_here_when: Work changes team-management UI, native Agent/Skill/MCP listings, Skill Market UX, MCP probe/golden-test UX, or provider sync UX.
        bridge_when: Native Agent / Skill / MCP backend contract changes — see native-agent-skills.
        primary_paths:
          - frontend/src/features/right-panel/TeamTab.tsx
          - frontend/src/stores/nativeAgentStore.ts
          - frontend/src/services/backendApi.ts
      - id: workflow-tab
        summary: WorkflowTab — cached agent-workflow listing + per-agent run history, invoked from editor selection.
        route_here_when: Work changes how agent workflows are displayed or invoked inline.
        bridge_when: Run contract changes — see workflow-integration/workflow-run.
        primary_paths:
          - frontend/src/features/right-panel/WorkflowTab.tsx
      - id: workflow-definitions
        summary: WorkflowDefinitionsPanel + WorkflowDefinitionEditor — CRUD for user-authored multi-agent workflows inside Team; embeds workflow-canvas for visual editing; test-run panel.
        route_here_when: Work changes definition CRUD, editor layout, or test-run inspection UI.
        bridge_when: Graph schema or test-run event shape change — see workflow-orchestration.
        primary_paths:
          - frontend/src/features/right-panel/WorkflowDefinitionsPanel.tsx
          - frontend/src/features/right-panel/WorkflowDefinitionEditor.tsx
      - id: run-history
        summary: RunHistoryTab — lists past WorkflowRun entries per document; click reopens the trace.
        route_here_when: Work changes history listing, filters, or replay UX.
        bridge_when: WorkflowRun schema changes — see backend-service/models.
        primary_paths:
          - frontend/src/features/right-panel/RunHistoryTab.tsx

  - id: frontend-feature-workflow-canvas
    name: Workflow Canvas
    summary: Visual multi-agent workflow editor (react-flow / @xyflow/react). Agent + loop node model with arbitrary nesting. Embedded inside WorkflowDefinitionEditor.
    slices:
      - id: canvas
        summary: WorkflowCanvas — react-flow mount, drag-and-drop, edge validation, health check integration.
        route_here_when: Work changes canvas interactions, edge rules, or react-flow wiring.
        bridge_when: Node type additions (beyond agent/loop) escalate to high_risk — see CHANGE_POLICY.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/WorkflowCanvas.tsx
          - frontend/src/features/right-panel/workflow-canvas/workflow-canvas.css
      - id: palette
        summary: NodePalette — source of draggable node templates.
        route_here_when: Work changes available node types or palette UX.
        bridge_when: New node type requires orchestrator + type updates.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/NodePalette.tsx
      - id: inspector
        summary: NodeInspector — right-side node config form (agent-id picker, additional_prompt, loop config).
        route_here_when: Work changes per-node configuration fields or validation.
        bridge_when: Config schema changes — see frontend-stores/workflow + backend models.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/NodeInspector.tsx
      - id: nodes
        summary: Visual node components (AgentNode, LoopNode, InputNode, OutputNode).
        route_here_when: Work changes node rendering, status indicators, or capsule UI.
        bridge_when: Status events change — see workflow-orchestration.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/nodes.tsx
      - id: graph-conversion
        summary: graphConversion + health — convert between react-flow state and persisted graph JSON; health check (reachability, missing-agent detection).
        route_here_when: Work changes graph persistence or validation.
        bridge_when: Backend graph schema changes — see backend-service/models.
        primary_paths:
          - frontend/src/features/right-panel/workflow-canvas/graphConversion.ts
          - frontend/src/features/right-panel/workflow-canvas/health.ts

  - id: frontend-conversations
    name: Frontend Conversations
    summary: Chat-style doc-scoped conversations with agents. Spans DiscussionTab (UI) + conversationStore (state) + /api/conversations (backend).
    slices:
      - id: store
        summary: conversationStore — per-conversation message list, SSE streaming delta accumulation, create/delete/title update, send-message lifecycle.
        route_here_when: Work changes message send/stream/persist logic or conversation lifecycle.
        bridge_when: Backend conversation API schema change.
        primary_paths:
          - frontend/src/stores/conversationStore.ts
          - frontend/src/services/backendApi.ts
      - id: api
        summary: /api/conversations CRUD + SSE message streaming (user → agent reply). Weaves attached-files into prompt; handles Dify + Nanobot paths.
        route_here_when: Work changes message send/stream behavior, attached-files weaving, or conversation persistence.
        bridge_when: Attached-files contract change — see frontend-mention-system + CHANGE_POLICY.
        primary_paths:
          - backend/app/api/conversations.py
          - backend/app/services/attached_files.py

  - id: frontend-mention-system
    name: Frontend Mention System
    summary: |
      @-mention infrastructure shared across AnnotationPanel (CommentComposer +
      continue composer) and DiscussionTab. Parses @Agent / @Workflow / @File
      tokens; resolves files to attached content (text) or multimodal URLs
      (images); gates large files behind confirmation; highlights mentions
      inline via mirror overlay.
    slices:
      - id: parser
        summary: mentions.ts — parseMentions, segmentText, formatInsertion, uniqueMentionedAgents/Files/Workflows, flattenFileCandidates, sortFilesCurrentFirst, truncateForLLM, resolveAttachedFiles, buildAgentPrompt.
        route_here_when: Work changes mention parsing, candidate shape, prompt assembly, or file resolution.
        bridge_when: New candidate kind — update MentionInput dropdown + rendering callers.
        primary_paths:
          - frontend/src/services/mentions.ts
      - id: input-component
        summary: MentionInput + fileSizeGate — shared textarea with dropdown + highlight overlay; large-file confirmation dialog.
        route_here_when: Work changes input rendering, dropdown UX, overlay highlight, or size-gate thresholds.
        bridge_when: Parser contract change — see parser slice.
        primary_paths:
          - frontend/src/features/shared/MentionInput.tsx
          - frontend/src/features/shared/fileSizeGate.ts
          - frontend/src/features/shared/mention-input.css
      - id: backend-contract
        summary: attached_files.py — server-side normalize / clip / render for attached files; shared between conversations and workflows routes.
        route_here_when: Work changes per-file caps, total-budget caps, or rendered block format.
        bridge_when: Multimodal payload shape change — see workflow-integration/nanobot-client.
        primary_paths:
          - backend/app/services/attached_files.py

  - id: frontend-settings
    name: Frontend Settings UI
    summary: Provider registry management surface — dialog for CRUD + probe + activation.
    slices:
      - id: dialog
        summary: Radix Dialog that lists providers and hosts the add/edit form (Dify local / Dify cloud / Nanobot).
        route_here_when: Work changes provider CRUD UX, form validation, or supported provider kinds.
        bridge_when: New provider kind requires new backend client — coordinate with workflow-integration.
        primary_paths:
          - frontend/src/features/settings/SettingsDialog.tsx
          - frontend/src/features/settings/settings.css
          - frontend/src/features/settings/index.ts

  - id: frontend-stores
    name: Frontend State Layer
    summary: Zustand stores that hold single source of truth on the client, including project/user state, workflows, native Agents/Skills, automation, collaboration, history, and UI view state.
    slices:
      - id: document
        summary: documentStore — documents map, active id, content updates re-parse structure.
        route_here_when: Work changes how documents are loaded, activated, or mutated on the client.
        bridge_when: Schema changes to Document propagate across editor / parser / selection.
        primary_paths:
          - frontend/src/stores/documentStore.ts
          - frontend/src/stores/seedData.ts
      - id: editor
        summary: editorStore — per-doc EditorState with derived Selection.
        route_here_when: Work changes selection handling, cursor/viewport tracking, focus paragraph derivation.
        bridge_when: Selection shape changes force updates to Agent run inputs.
        primary_paths:
          - frontend/src/stores/editorStore.ts
      - id: settings
        summary: settingsStore — mirrors /api/providers; load/create/update/delete/activate/probe.
        route_here_when: Work changes provider sync semantics, active-provider invariants, or error handling.
        bridge_when: New provider fields require schema updates.
        primary_paths:
          - frontend/src/stores/settingsStore.ts
          - frontend/src/services/backendApi.ts
      - id: native-agent
        summary: nativeAgentStore — native Agent credentials, Skills, Skill Marketplace state, and native Agent CRUD backed by /api/native-agent.
        route_here_when: Work changes native Agent/Skill client state, marketplace error handling, install/update/delete semantics, or AgentSkill assignment.
        bridge_when: Backend contract changes route through native-agent-skills.
        primary_paths:
          - frontend/src/stores/nativeAgentStore.ts
          - frontend/src/services/backendApi.ts
      - id: automation
        summary: automationStore — recurring automation definitions and UI state for the Automation tab.
        route_here_when: Work changes automation list/create/update/delete state or polling behavior.
        bridge_when: Backend automation contract changes require backend-service/api-routes.
        primary_paths:
          - frontend/src/stores/automationStore.ts
          - frontend/src/features/right-panel/AutomationTab.tsx
      - id: workflow
        summary: workflowStore — cached workflows + workflow definitions CRUD; run (single-agent) + executeDefinition (multi-agent); SSE event consumption; annotation ingestion via outputParser.
        route_here_when: Work changes how runs are dispatched, events parsed, or outputs ingested.
        bridge_when: New SSE event surface — may require outputParser + annotationStore updates.
        primary_paths:
          - frontend/src/stores/workflowStore.ts
          - frontend/src/services/backendApi.ts
          - frontend/src/services/outputParser.ts
      - id: annotation
        summary: annotationStore — items keyed by documentId, status machine, per-card thread; createUserComment for user-authored comments with optional agent/workflow mention.
        route_here_when: Work changes card semantics, status transitions, accept/delete logic, or thread handling.
        bridge_when: Card changes require paired AnnotationPanel + decorations updates.
        primary_paths:
          - frontend/src/stores/annotationStore.ts
      - id: filesystem
        summary: filesystemStore — project tree (folders / docs / binary blobs) from /api/filesystem; CRUD + upload; getDoc for @-mention file resolution.
        route_here_when: Work changes tree loading, CRUD, or per-file fetch semantics.
        bridge_when: Tree schema changes — coordinate with backend project_fs_service.
        primary_paths:
          - frontend/src/stores/filesystemStore.ts
          - frontend/src/services/filesystemApi.ts
      - id: conversation
        summary: conversationStore — per-conversation message lists, SSE streaming, create/delete/title, send-message dispatch to /api/conversations.
        route_here_when: Work changes discussion state machine.
        bridge_when: Backend conversation contract change.
        primary_paths:
          - frontend/src/stores/conversationStore.ts
      - id: compile
        summary: compileStore — LaTeX compile state (idle / compiling / done / error), PDF url, triggers /api/compile.
        route_here_when: Work changes compile lifecycle or status UI.
        bridge_when: Backend compile contract change — see latex-compile capability.
        primary_paths:
          - frontend/src/stores/compileStore.ts
      - id: view
        summary: viewStore — column widths, collapse states for left/center/right columns.
        route_here_when: Work changes layout persistence or responsive behavior.
        bridge_when: Layout change touches workspace shell.
        primary_paths:
          - frontend/src/stores/viewStore.ts

  - id: latex-editor
    name: LaTeX Editor Module
    summary: Self-contained CodeMirror 6 editor under src/frontend/src/features/latex-editor/. Owns syntax, theme, autocomplete, and the format Compartment.
    slices:
      - id: shell
        summary: LatexEditor.tsx + index.ts — mount/unmount, value/format/onChange/onSelectionChange contract, decoration plugin mount.
        route_here_when: Work changes editor public API, mounting behavior, or the shell-to-editor contract.
        bridge_when: Public API changes require workspace-center updates.
        primary_paths:
          - frontend/src/features/latex-editor/LatexEditor.tsx
          - frontend/src/features/latex-editor/index.ts
      - id: extensions
        summary: CodeMirror 6 extension bundle. baseExtensions() is language-free; language Compartment wired by LatexEditor.
        route_here_when: Work adds, removes, or reorders editor extensions, keymaps, or language hooks.
        bridge_when: A new extension introduces side effects outside the editor.
        primary_paths:
          - frontend/src/features/latex-editor/extensions.ts
      - id: language
        summary: LaTeX language definition — stex stream parser plus command/environment autocomplete sources.
        route_here_when: Work expands LaTeX language support, autocomplete data, or grammar choice.
        bridge_when: Switching to Lezer LaTeX grammar — high_risk.
        primary_paths:
          - frontend/src/features/latex-editor/latex-language.ts
      - id: theme
        summary: Editor theme — overleaf_dark port (CM6 theme + HighlightStyle).
        route_here_when: Work tunes editor colors, font, or syntax highlight palette.
        bridge_when: Workspace shell theme changes.
        primary_paths:
          - frontend/src/features/latex-editor/theme.ts
      - id: decorations
        summary: annotation-decorations plugin — StateField + Decoration.mark + click handler for annotation kinds.
        route_here_when: Work changes decoration rendering or click handling.
        bridge_when: New decoration kinds require paired annotationStore updates.
        primary_paths:
          - frontend/src/features/latex-editor/annotation-decorations.ts
      - id: math-preview
        summary: |
          Cursor-triggered formula preview tooltip. When the caret enters a math
          environment ($..$, $$..$$, \[..\], \(..\), or equation/align/gather/...
          environments) a tooltip floats above and renders the formula via lazy-
          loaded MathJax v3 (tex-svg-full SVG bundle). Document-wide \newcommand /
          \def / \newenvironment macros are extracted and fed to MathJax first so
          custom commands resolve. Toggled by the settingsStore `mathPreview` flag
          (persisted to localStorage), surfaced in SettingsDialog, threaded through
          EditorColumn → LatexEditor via a CodeMirror Compartment. Esc hides the
          active tooltip.
        route_here_when: Work changes in-editor math detection, macro extraction, MathJax loader config, tooltip rendering/styling, or the math-preview enable toggle and its wiring.
        bridge_when: Markdown/PDF preview math rendering — see frontend-preview. Editor mount/Compartment contract — see latex-editor/shell. Settings persistence schema — see frontend-stores/settings.
        invariants:
          - MathJax is lazy-loaded once (single promise) and code-split out of the main bundle; it must not load until the feature is enabled AND the caret first enters a formula.
          - enableAssistiveMml is false and mjx-assistive-mml is hidden — leaving the parallel MathML on renders every formula twice (no MathJax stylesheet is loaded for the SVG bundle).
          - safe mode / loader / menu config is NOT used — the tex-svg-full bundle ships no loader; rendering trusted user-document math needs none. await startup.promise before tex2svgPromise.
        primary_paths:
          - frontend/src/features/latex-editor/math-preview.ts
          - frontend/src/features/latex-editor/math-detection.ts
          - frontend/src/features/latex-editor/mathjax-loader.ts
          - frontend/src/features/latex-editor/math-preview.css
          - frontend/src/types/mathjax.d.ts
          - frontend/src/features/latex-editor/LatexEditor.tsx
          - frontend/src/stores/settingsStore.ts
          - frontend/src/features/settings/SettingsDialog.tsx
          - frontend/src/__tests__/mathPreview.test.ts

  - id: latex-compile
    name: LaTeX Compile
    summary: End-to-end LaTeX → PDF pipeline. Spans backend latex_compiler service + /api/compile route + frontend LatexPreview + compileStore.
    slices:
      - id: backend
        summary: latex_compiler.py — latexmk subprocess wrapper; tempdir management; returns PDF bytes or error log.
        route_here_when: Work changes compile flags, output format, or error extraction.
        bridge_when: Compile backend change (pandoc / tectonic) escalates to high_risk.
        primary_paths:
          - backend/app/services/latex_compiler.py
          - backend/app/api/compile.py
      - id: frontend
        summary: LatexPreview + compileStore — triggers compile, displays PDF via pdfjs-dist, shows error log on failure.
        route_here_when: Work changes preview rendering, PDF navigation, or compile triggering.
        bridge_when: Backend contract change.
        primary_paths:
